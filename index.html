<!DOCTYPE html>
<html>
<head>
<title>UAT Tracker</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

<div class="container">

<h3>Register BRD</h3>

<div class="row mb-4">

<div class="col">
<select id="module" class="form-select">
<option>OMS</option>
<option>FTC</option>
<option>MIS</option>
<option>Scheduling</option>
</select>
</div>

<div class="col">
<input id="brd" class="form-control" placeholder="BRD Ref">
</div>

<div class="col">
<select id="status" class="form-select">
<option>Completed</option>
<option>Partially Completed</option>
<option>Re-Demo Required</option>
<option>Fully Closed</option>
</select>
</div>

<div class="col">
<button class="btn btn-primary" onclick="createBRD()">Create</button>
</div>

</div>

<h4>BRD List</h4>

<table class="table table-bordered">
<thead>
<tr>
<th>Module</th>
<th>BRD</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="brdTable"></tbody>

</table>

</div>

<script>

async function createBRD(){

 const data={
  module:document.getElementById("module").value,
  brd_ref:document.getElementById("brd").value,
  status:document.getElementById("status").value
 };

 await fetch("/api/add-brd",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify(data)
 });

 loadBRDs();
}

async function loadBRDs(){

 const res = await fetch("/api/get-brds");
 const data = await res.json();

 let html="";

 data.forEach(b=>{

  html+=`
   <tr>
    <td>${b.module}</td>
    <td>${b.brd_ref}</td>
    <td>${b.uat_status}</td>
    <td>
    <a href="manage-issues.html?id=${b.id}" class="btn btn-sm btn-danger">Manage Issues</a>
    </td>
   </tr>
  `;

 });

 document.getElementById("brdTable").innerHTML=html;

}

loadBRDs();

</script>

</body>
</html>
