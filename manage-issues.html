<!DOCTYPE html>
<html>
<head>
<title>Manage Issues</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

<div class="container">

<h3>Manage Issues</h3>

<table class="table table-bordered">

<thead>
<tr>
<th>Title</th>
<th>Assignee</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="issueBody"></tbody>

</table>

<button class="btn btn-success" onclick="addRow()">Add Row</button>
<button class="btn btn-primary" onclick="saveIssues()">Save</button>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const brd_id = params.get("id");

function addRow(){

 const html=`
 <tr>
 <td><input class="form-control title"></td>
 <td><input class="form-control assignee"></td>
 <td>
 <select class="form-select status">
 <option>Open</option>
 <option>In Progress</option>
 <option>Fixed</option>
 </select>
 </td>
 <td><button onclick="this.closest('tr').remove()" class="btn btn-danger btn-sm">X</button></td>
 </tr>
 `;

 document.getElementById("issueBody").insertAdjacentHTML("beforeend",html);

}

async function loadIssues(){

 const res = await fetch("/api/get-issues?brd_id="+brd_id);
 const data = await res.json();

 data.forEach(i=>{

  const html=`
  <tr>
  <td><input class="form-control title" value="${i.issue_title}"></td>
  <td><input class="form-control assignee" value="${i.assignee}"></td>
  <td>
  <select class="form-select status">
  <option ${i.issue_status=="Open"?"selected":""}>Open</option>
  <option ${i.issue_status=="In Progress"?"selected":""}>In Progress</option>
  <option ${i.issue_status=="Fixed"?"selected":""}>Fixed</option>
  </select>
  </td>
  <td><button onclick="this.closest('tr').remove()" class="btn btn-danger btn-sm">X</button></td>
  </tr>
  `;

  document.getElementById("issueBody").insertAdjacentHTML("beforeend",html);

 });

}

async function saveIssues(){

 const rows = document.querySelectorAll("#issueBody tr");

 const issues=[];

 rows.forEach(r=>{

  issues.push({
   title:r.querySelector(".title").value,
   assignee:r.querySelector(".assignee").value,
   status:r.querySelector(".status").value
  });

 });

 await fetch("/api/save-issues",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({brd_id,issues})
 });

 alert("Saved");

}

loadIssues();

</script>

</body>
</html>
